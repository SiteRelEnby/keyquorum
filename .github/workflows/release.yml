name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings

  verify-version:
    name: Verify tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          for manifest in crates/keyquorum-core/Cargo.toml crates/keyquorum/Cargo.toml crates/keyquorum-split/Cargo.toml; do
            VERSION=$(grep '^version' "$manifest" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "$VERSION" != "$TAG" ]; then
              echo "ERROR: $manifest version ($VERSION) does not match tag (v$TAG)"
              exit 1
            fi
          done
          echo "All versions match tag: v$TAG"

  publish-crates:
    name: Publish to crates.io
    needs: [test, verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish keyquorum-core
        run: cargo publish -p keyquorum-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish keyquorum
        run: cargo publish -p keyquorum
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish keyquorum-split
        run: cargo publish -p keyquorum-split
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: [test, verify-version]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ contains(matrix.target, 'apple') }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/keyquorum dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/keyquorum-split dist/ 2>/dev/null || true
          cd dist
          tar czf ../keyquorum-${TAG}-${{ matrix.target }}.tar.gz *
      - uses: actions/upload-artifact@v4
        with:
          name: keyquorum-${{ matrix.target }}
          path: keyquorum-*.tar.gz

  github-release:
    name: GitHub Release
    needs: [publish-crates, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE=""
          if echo "$TAG" | grep -qEi 'alpha|beta|rc|dev'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE \
            artifacts/*
