[advisories]
version = 2
# sharks has a known bias in polynomial coefficients (RUSTSEC-2024-0398).
# Impact is low for single-use secrets (LUKS keys). Migration to blahaj
# (maintained fork with the fix) is planned.
ignore = ["RUSTSEC-2024-0398"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
